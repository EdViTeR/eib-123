<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Bonneville Café</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Подключение CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Шрифты -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap&quot; rel="stylesheet">
</head>

<body>

<header class="header">
    <div class="container nav">
        <div class="logo">
            <img src="images/logo.png" alt="Bonneville Café">
        </div>

        <nav>
            <ul>
                <li><a href="#">Главная</a></li>
                <li><a href="#">Меню</a></li>
                <li><a href="#">О нас</a></li>
                <li><a href="#">Бронирование</a></li>
                <li><a href="#">Контакты</a></li>
            </ul>
        </nav>

        <button class="call-btn">Позвонить</button>
    </div>
</header>

<section class="hero">
    <div class="container hero-content">

        <div class="hero-text">
            <div class="tag">Пекарня-Кондитерская</div>

            <h1>Bonneville
Café</h1>

            <p>Каждый день свежая выпечка и десерты</p>

            <button class="book-btn">
                Забронировать стол
            </button>
        </div>

        <div class="hero-image">
            <img src="images/hero.jpg" alt="Круассаны">
        </div>

    </div>
</section>

<section class="features">
    <div class="container features-content">

        <div class="feature">
            <img src="images/icon-coffee.png" alt="Кофе">
            <p>Завтраки подаём
в течение всего дня</p>
        </div>

        <div class="feature">
            <img src="images/icon-discount.png" alt="Скидка">
            <p>Скидка 50% на выпечку
и десерты после 20:00</p>
        </div>

    </div>
</section>

</body>
</html>
