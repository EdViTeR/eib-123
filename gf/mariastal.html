<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧶 Crochet Store — Премиум вязаные вещи</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ХЕДЕР -->
<table class="header-table">
  <tr>
    <td width="20%">
        <span class="logo">Crochet Store</span>
        <br><span class="logo-sub">Премиум вязаные вещи</span>
    </td>
    <td align="center" class="nav-links">
      <a href="#">Главная</a>
      <a href="#">Вязаные изделия</a>
      <a href="#">Пряжа</a>
      <a href="#">Корзина</a>
    </td>
    <td width="25%"></td>
  </tr>
</table>

<!-- ОСНОВНОЙ КОНТЕНТ -->
<div class="main-content">

  <!-- КОЛЛЕКЦИЯ 1: Осенняя -->
  <div class="collection-section">
    <span class="collection-title">Cozy fall</span>
    <div class="collection-frame collection-frame--fall">
      <div class="products-row">
        <div class="product-card">
          <img src="свитера.jpg" alt="Свитера">
          <span class="product-name">Свитера</span>
        </div>
        <div class="product-card">
          <img src="береты.jpg" alt="Береты">
          <span class="product-name">Береты</span>
        </div>
        <div class="product-card">
          <img src="носки.jpg" alt="Носки">
          <span class="product-name">Носки</span>
        </div>
        <div class="product-card">
          <img src="сумка.jpg" alt="Сумки">
          <span class="product-name">Сумки</span>
        </div>
      </div>
    </div>
    <div class="view-all-wrapper">
      <a href="#" class="view-all-btn">view all</a>
    </div>
  </div>

  <!-- КОЛЛЕКЦИЯ 2: Зимняя -->
  <div class="collection-section">
    <span class="collection-title">All I want for Christmas</span>
    <div class="collection-frame collection-frame--winter">
      <div class="products-row products-row--three">
        <div class="product-card">
          <img src="шарфы.jpg" alt="Шарфы">
          <span class="product-name">Шарфы</span>
        </div>
        <div class="product-card">
          <img src="аксессуары.jpg" alt="Аксессуары">
          <span class="product-name">Аксессуары</span>
        </div>
        <div class="product-card">
          <img src="игрушки.jpg" alt="Игрушки">
          <span class="product-name">Игрушки</span>
        </div>
      </div>
    </div>
    <div class="view-all-wrapper">
      <a href="#" class="view-all-btn">view all</a>
    </div>
  </div>

</div>

<!-- ФУТЕР -->
<table class="footer-table">
  <tr>
    <td>
        © 2026 Crochet Store. Все права защищены.
        <a href="#">Главная</a>
        <a href="#">Вязаные изделия</a>
        <a href="#">Пряжа</a>
    </td>
    <td align="right" style="padding-right: 20px;">
        <a href="#">Контакты</a>
    </td>
  </tr>
</table>

</body>
</html>
