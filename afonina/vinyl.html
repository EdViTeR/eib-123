<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>vinyl journey · icons & price D1C9C9</title>
    <!-- Google Fonts: Notable + Days One -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Days+One&family=Notable&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: black;
            font-family: 'Days One', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 0;
        }

        .phone-frame {
            max-width: 400px;
            width: 100%;
            background-color: black;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 30px rgba(255,255,255,0.05);
            min-height: 100vh;
            color: #eee;
        }

        /* --- HERO (фон + текст цвета D1C9C9) --- */
        .hero-bg {
            background-image: url('https://kluch.media/upload/photo/2021/1112-Vinil/5.jpg');
            background-size: cover;
            background-position: center 30%;
            background-repeat: no-repeat;
            width: 100%;
            padding: 100px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background-color: #1a140e;
            border-bottom: 2px solid #3a2e24;
            min-height: 340px;
        }

        .vinyl-records {
            font-family: 'Notable', sans-serif;
            font-size: 2.4rem;
            line-height: 1.1;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #D1C9C9;
            margin-bottom: 1rem;
            max-width: 90%;
            word-break: break-word;
        }

        .tagline {
            font-family: 'Days One', sans-serif;
            font-size: 1rem;
            line-height: 1.5;
            color: #D1C9C9;
            max-width: 85%;
            margin: 0 auto 1.5rem auto;
        }

        /* КНОПКА CATALOG — красный овал, белая надпись */
        .catalog-btn {
            background-color: #A3413D;
            border: none;
            border-radius: 40px;
            padding: 12px 36px;
            font-family: 'Notable', sans-serif;
            font-size: 1.6rem;
            text-transform: uppercase;
            color: white;
            letter-spacing: 1.5px;
            width: fit-content;
            margin: 0 auto;
            box-shadow: 0 6px 0 #5e2a27;
            cursor: default;
            border: 1px solid #c06964;
        }

        /* нижняя часть */
        .lower-section {
            padding: 28px 20px 40px 20px;
            background-color: black;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .vinyl-catalog-head {
            font-family: 'Notable', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 1px;
            color: #e6d5bd;
            margin: 0 0 0.8rem 0;
            line-height: 1.1;
            text-transform: uppercase;
        }
        .vinyl-catalog-head span {
            color: #A3413D;
        }

        /* ЖАНРЫ В КРАСНЫХ ОВАЛАХ */
        .genre-search-row {
            display: flex;
            flex-wrap: nowrap;
            align-items: center;
            gap: 0.5rem;
            overflow-x: auto;
            white-space: nowrap;
            padding-bottom: 8px;
            margin-bottom: 1.8rem;
            -webkit-overflow-scrolling: touch;
        }

        .genre-list {
            display: flex;
            flex-wrap: nowrap;
            gap: 0.7rem;
            align-items: center;
        }

        .genre-item {
            font-family: 'Notable', sans-serif;
            font-size: 0.9rem;
            text-transform: uppercase;
            color: white;
            background-color: #A3413D;
            padding: 8px 16px;
            border-radius: 40px;
            letter-spacing: 0.3px;
            display: inline-block;
            white-space: nowrap;
            border: 1px solid #c06964;
            box-shadow: 0 3px 0 #5e2a27;
        }

        .search-icon {
            font-family: 'Days One', sans-serif;
            font-size: 1.2rem;
            margin-left: auto;
            background-color: #262016;
            padding: 8px 16px;
            border-radius: 30px;
            color: #e6d2b5;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            border: 1px solid #7a634b;
            flex-shrink: 0;
        }

        .search-icon i {
            font-size: 1.2rem;
            color: #cfb48c;
        }
        .search-icon span {
            font-family: 'Days One', sans-serif;
            font-size: 0.9rem;
        }

        /* === КАРТОЧКИ — цвет названий пластинок, цен и иконок D1C9C9 === */
        .record-grid-new {
            display: flex;
            flex-direction: column;
            gap: 1.8rem;
            margin-top: 0.5rem;
        }

        .vinyl-card {
            background-color: #0c0c0c;
            border: 2px solid #ffffff;
            border-radius: 28px;
            padding: 18px 18px 20px 18px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            box-shadow: 0 12px 0 #3a3a3a;
        }

        .card-cover {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-size: cover;
            background-position: center;
            border-radius: 18px;
            border: 2px solid #a5865b;
            background-color: #2a2a2a;
        }

        .cover-fleetwood {
            background-image: url('https://avatars.mds.yandex.net/get-mpic/18322766/2a0000019b267db650cb889dd1d9798260e9/orig');
        }
        .cover-abba {
            background-image: url('https://media.cdn.kaufland.de/product-images/original/e8974989f4193ac474df1b4c3ba233e6.jpg');
        }
        .cover-abbey {
            background-image: url('https://www.udiscovermusic.com/wp-content/uploads/2022/01/abbey-road.jpg');
        }

        .card-info-row {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .card-text-block {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .card-artist {
            font-family: 'Notable', sans-serif;
            font-size: 1.8rem;
            text-transform: uppercase;
            color: #D1C9C9;                 /* цвет D1C9C9 для исполнителя */
            line-height: 1.2;
            letter-spacing: 0.5px;
        }

        .card-price {
            font-family: 'Days One', sans-serif;
            font-size: 1.6rem;
            color: #D1C9C9;                 /* ИЗМЕНЕНО: теперь D1C9C9 */
            background: #1f1913;
            padding: 2px 12px;
            border-radius: 30px;
            border: 1px solid #a48154;
            width: fit-content;
        }

        .card-actions {
            display: flex;
            gap: 22px;
            align-items: center;
            margin-left: auto;
        }
        .card-actions i {
            font-size: 2rem;
            color: #D1C9C9;                 /* ИЗМЕНЕНО: иконки сердца и корзины теперь D1C9C9 */
            filter: drop-shadow(0 2px 2px black);
        }

        @media (max-width: 380px) {
            .vinyl-records { font-size: 2rem; }
            .card-artist { font-size: 1.5rem; }
            .genre-item { font-size: 0.8rem; padding: 6px 12px; }
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <!-- Hero с текстом цвета D1C9C9 -->
        <div class="hero-bg">
            <div class="vinyl-records">VINYL RECORDS</div>
            <div class="tagline">Welcome aboard the Vinyl journey, where your music's transformation begins it's flight to greatness!</div>
            <div class="catalog-btn">Catalog</div>
        </div>

        <!-- нижняя часть -->
        <div class="lower-section">
            <!-- VINYL CATALOG с красным словом CATALOG -->
            <div class="vinyl-catalog-head">VINYL <span>CATALOG</span></div>

            <!-- ЖАНРЫ В КРАСНЫХ ОВАЛАХ -->
            <div class="genre-search-row">
                <div class="genre-list">
                    <span class="genre-item">JAZZ</span>
                    <span class="genre-item">ROCK</span>
                    <span class="genre-item">ALTERNATIVE ROCK</span>
                    <span class="genre-item">INDIE</span>
                    <span class="genre-item">ELECTRONIC</span>
                    <span class="genre-item">HIP-HOP</span>
                    <span class="genre-item">FOLK</span>
                    <span class="genre-item">RAP</span>
                </div>
                <div class="search-icon">
                    <i class="fas fa-magnifying-glass"></i>
                    <span>search</span>
                </div>
            </div>

            <!-- карточки пластинок с ценами и иконками цвета D1C9C9 -->
            <div class="record-grid-new">
                <!-- FLEETWOOD MAC -->
                <div class="vinyl-card">
                    <div class="card-cover cover-fleetwood"></div>
                    <div class="card-info-row">
                        <div class="card-text-block">
                            <span class="card-artist">FLEETWOOD MAC</span>
                            <span class="card-price">8990P</span>
                        </div>
                        <div class="card-actions">
                            <i class="fas fa-heart"></i>
                            <i class="fas fa-shopping-cart"></i>
                        </div>
                    </div>
                </div>

                <!-- ABBA -->
                <div class="vinyl-card">
                    <div class="card-cover cover-abba"></div>
                    <div class="card-info-row">
                        <div class="card-text-block">
                            <span class="card-artist">ABBA</span>
                            <span class="card-price">8990P</span>
                        </div>
                        <div class="card-actions">
                            <i class="fas fa-heart"></i>
                            <i class="fas fa-shopping-cart"></i>
                        </div>
                    </div>
                </div>

                <!-- ABBEY ROAD -->
                <div class="vinyl-card">
                    <div class="card-cover cover-abbey"></div>
                    <div class="card-info-row">
                        <div class="card-text-block">
                            <span class="card-artist">ABBEY ROAD</span>
                            <span class="card-price">9990P</span>
                        </div>
                        <div class="card-actions">
                            <i class="fas fa-heart"></i>
                            <i class="fas fa-shopping-cart"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
